<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ppt-web</title>

  <!-- DEV ONLY: Tailwind via CDN. Production should switch to PostCSS build
       for tree-shaking (~360KB → ~10KB). -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            gemini: {
              50:'#e8f0fe',100:'#d2e3fc',200:'#aecbfa',300:'#8ab4f8',400:'#669df6',
              500:'#4285f4',600:'#1a73e8',700:'#1967d2',800:'#185abc',900:'#174ea6',
            },
          },
          borderRadius: { sm:'6px', md:'10px', lg:'16px', xl:'20px' },
          boxShadow: {
            sm:'0 1px 2px 0 rgb(0 0 0 / 0.04)',
            md:'0 1px 3px 0 rgb(0 0 0 / 0.06), 0 1px 2px -1px rgb(0 0 0 / 0.04)',
            lg:'0 4px 12px -2px rgb(0 0 0 / 0.08), 0 2px 4px -2px rgb(0 0 0 / 0.04)',
          },
          fontFamily: {
            sans:['Inter','system-ui','-apple-system','"PingFang SC"','"Microsoft YaHei"','sans-serif'],
          },
        },
      },
    };
  </script>

  <link rel="stylesheet" href="/static/css/tokens.css?v=1" />
  <link rel="stylesheet" href="/static/css/components.css?v=1" />

  <!-- Apply persisted theme before paint to avoid flash -->
  <script>
    (function () {
      try {
        var t = localStorage.getItem('ppt.theme');
        if (t === 'dark' || (!t && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
          document.documentElement.classList.add('dark');
        }
      } catch (e) {}
    })();
  </script>

  <!-- Load our module before Alpine so it can register alpine:init handlers first. -->
  <script type="module" src="/static/js/main.js?v=2"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/@alpinejs/persist@3.14.9/dist/cdn.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.14.9/dist/cdn.min.js"></script>
</head>
<body class="bg-slate-50 dark:bg-slate-950 text-slate-900 dark:text-slate-100 font-sans antialiased">

  <div id="app" x-data="appShell()" x-init="boot()" x-cloak class="min-h-screen">

    <!-- Loading -->
    <template x-if="!booted">
      <div class="flex h-screen items-center justify-center text-slate-400 dark:text-slate-600">
        <span>载入中…</span>
      </div>
    </template>

    <!-- Auth view (logged out) -->
    <template x-if="booted && !$store.auth.isAuthenticated()">
      <div x-data="authView" class="min-h-screen flex flex-col">
        <header class="px-6 h-14 flex items-center border-b border-slate-200 dark:border-slate-800">
          <span class="font-semibold text-lg">ppt-web</span>
        </header>
        <main class="flex-1 flex items-center justify-center px-4 py-10">
          <div class="w-full max-w-sm bg-white dark:bg-slate-900 rounded-xl shadow-md p-6">
            <h1 class="text-xl font-semibold mb-1" x-text="mode === 'login' ? '登录' : '注册'"></h1>
            <p class="text-sm text-slate-500 dark:text-slate-400 mb-5"
               x-text="mode === 'login' ? '使用邮箱继续' : '创建账号，邮箱即可'"></p>

            <form @submit.prevent="submit()" class="space-y-3">
              <label class="block">
                <span class="text-xs text-slate-500 dark:text-slate-400">邮箱</span>
                <input type="email" required x-model="email"
                       class="mt-1 w-full px-3 py-2 rounded-md border border-slate-200 dark:border-slate-700
                              bg-white dark:bg-slate-800 focus:outline-none focus:ring-2 focus:ring-gemini-500/30
                              focus:border-gemini-500" />
              </label>
              <label class="block">
                <span class="text-xs text-slate-500 dark:text-slate-400">密码</span>
                <input type="password" required minlength="6" x-model="password"
                       class="mt-1 w-full px-3 py-2 rounded-md border border-slate-200 dark:border-slate-700
                              bg-white dark:bg-slate-800 focus:outline-none focus:ring-2 focus:ring-gemini-500/30
                              focus:border-gemini-500" />
              </label>
              <p x-show="error" class="text-xs text-rose-600" x-text="error"></p>
              <button type="submit" :disabled="submitting"
                      class="w-full px-3 py-2 rounded-md bg-gemini-600 hover:bg-gemini-700
                             text-white text-sm font-medium disabled:opacity-50">
                <span x-text="submitting ? '处理中…' : (mode === 'login' ? '登录' : '注册')"></span>
              </button>
            </form>

            <p class="mt-4 text-center text-xs text-slate-500 dark:text-slate-400">
              <template x-if="mode === 'login'">
                <span>没有账号？<button @click="setMode('register')"
                  class="text-gemini-600 hover:underline">注册</button></span>
              </template>
              <template x-if="mode === 'register'">
                <span>已有账号？<button @click="setMode('login')"
                  class="text-gemini-600 hover:underline">登录</button></span>
              </template>
            </p>
          </div>
        </main>
      </div>
    </template>

    <!-- Main app (logged in) -->
    <template x-if="booted && $store.auth.isAuthenticated()">
      <div x-data="layout" class="min-h-screen flex flex-col">

        <!-- Header -->
        <header class="h-14 flex items-center px-4 border-b border-slate-200 dark:border-slate-800
                       bg-white/80 dark:bg-slate-900/80 backdrop-blur sticky top-0 z-30">
          <button @click="toggleSidebar()" class="md:hidden mr-2 p-2 rounded hover:bg-slate-100 dark:hover:bg-slate-800"
                  aria-label="切换侧栏">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/>
              <line x1="3" y1="18" x2="21" y2="18"/>
            </svg>
          </button>
          <h1 class="font-semibold text-base mr-auto cursor-pointer" @click="go('#/')">ppt-web</h1>
          <div class="flex items-center gap-3 text-sm">
            <span class="hidden sm:inline text-slate-500 dark:text-slate-400"
                  x-text="$store.auth.me?.email"></span>
            <span class="px-2 py-0.5 rounded-full bg-gemini-50 dark:bg-gemini-900/30
                         text-gemini-700 dark:text-gemini-200 text-xs font-medium"
                  x-text="`${$store.auth.quota()} credits`"></span>
            <button @click="toggleTheme()"
                    class="p-1.5 rounded hover:bg-slate-100 dark:hover:bg-slate-800"
                    aria-label="切换主题">
              <svg x-show="!$store.theme.isDark()" width="18" height="18" viewBox="0 0 24 24" fill="none"
                   stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="4"/>
                <path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/></svg>
              <svg x-show="$store.theme.isDark()" width="18" height="18" viewBox="0 0 24 24" fill="none"
                   stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
            </button>
            <button @click="logout()" class="text-xs text-slate-500 hover:text-rose-600">登出</button>
          </div>
        </header>

        <!-- Body: sidebar + outlet -->
        <div class="flex-1 flex">

          <!-- Mobile overlay -->
          <div x-show="sidebarOpen" @click="closeSidebar()" x-transition.opacity
               class="md:hidden fixed inset-0 bg-black/30 z-20" x-cloak></div>

          <!-- Sidebar -->
          <aside x-data="sidebar"
                 class="w-72 shrink-0 border-r border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900
                        flex flex-col
                        md:relative md:translate-x-0
                        fixed inset-y-0 left-0 z-30 transition-transform duration-200"
                 :class="sidebarOpen ? 'translate-x-0' : '-translate-x-full md:translate-x-0'">

            <div class="p-3 border-b border-slate-200 dark:border-slate-800 space-y-2">
              <button @click="go('#/new')"
                      class="w-full px-3 py-2 rounded-md bg-gemini-600 hover:bg-gemini-700
                             text-white text-sm font-medium flex items-center justify-center gap-1.5">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                  <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
                </svg>
                新建任务
              </button>
              <button @click="go('#/templates')"
                      class="w-full px-3 py-2 rounded-md border border-slate-200 dark:border-slate-700
                             hover:bg-slate-50 dark:hover:bg-slate-800 text-sm">
                模板库
              </button>
              <input type="search" x-model="query" @input="onQueryInput()" placeholder="搜索任务…"
                     class="w-full px-3 py-1.5 rounded-md border border-slate-200 dark:border-slate-700
                            bg-white dark:bg-slate-800 text-sm focus:outline-none focus:border-gemini-500" />
            </div>

            <div class="flex items-center gap-1 px-3 py-2 text-xs">
              <button @click="setFilter('all')"
                      :class="filter === 'all' ? 'bg-gemini-600 text-white' : 'text-slate-500 hover:bg-slate-100 dark:hover:bg-slate-800'"
                      class="px-2 py-0.5 rounded">全部</button>
              <button @click="setFilter('running')"
                      :class="filter === 'running' ? 'bg-gemini-600 text-white' : 'text-slate-500 hover:bg-slate-100 dark:hover:bg-slate-800'"
                      class="px-2 py-0.5 rounded">运行中</button>
              <button @click="setFilter('done')"
                      :class="filter === 'done' ? 'bg-gemini-600 text-white' : 'text-slate-500 hover:bg-slate-100 dark:hover:bg-slate-800'"
                      class="px-2 py-0.5 rounded">完成</button>
              <button @click="setFilter('failed')"
                      :class="filter === 'failed' ? 'bg-gemini-600 text-white' : 'text-slate-500 hover:bg-slate-100 dark:hover:bg-slate-800'"
                      class="px-2 py-0.5 rounded">失败</button>
              <span class="ml-auto text-slate-400" x-text="`${filteredCount}/${totalCount}`"></span>
            </div>

            <div class="flex-1 overflow-y-auto scrollbar-thin">
              <template x-for="g in groups" :key="g.key">
                <div class="py-1">
                  <h3 class="px-3 pt-2 pb-1 text-xs font-medium text-slate-400 uppercase tracking-wide"
                      x-text="g.label"></h3>
                  <ul class="space-y-0.5 px-1.5">
                    <template x-for="j in g.items" :key="j.id">
                      <li x-data="jobCard(j)"
                          @click="navigate()"
                          class="group flex gap-2.5 px-2 py-2 rounded-md cursor-pointer
                                 hover:bg-slate-100 dark:hover:bg-slate-800"
                          :class="window.location.hash === '#/jobs/' + j.id
                                  ? 'bg-gemini-50 dark:bg-gemini-900/20' : ''">
                        <div class="w-8 h-8 shrink-0 rounded-md flex items-center justify-center text-white text-sm font-semibold"
                             :style="`background: ${avatarColor}`"
                             x-text="avatarLetter"></div>
                        <div class="flex-1 min-w-0">
                          <div class="flex items-center gap-1.5">
                            <span class="font-medium text-sm truncate" x-text="j.project_name || '(未命名)'"></span>
                          </div>
                          <div class="flex items-center gap-1.5 mt-0.5">
                            <span class="status-pill" :class="statusClass" x-text="statusLabel"></span>
                            <span x-data="queueBadge(j.queue_position)" x-show="visible"
                                  class="queue-badge"
                                  x-text="`#${pos}`"></span>
                          </div>
                          <div class="text-xs text-slate-500 dark:text-slate-400 truncate mt-0.5"
                               x-text="`${time} · ${cost}`"></div>
                        </div>
                        <button x-show="hasPptx" @click="download($event)"
                                class="opacity-0 group-hover:opacity-100 shrink-0 self-center
                                       px-2 py-1 rounded text-xs hover:bg-gemini-100 dark:hover:bg-gemini-900/30
                                       text-gemini-700 dark:text-gemini-200"
                                title="下载 PPTX" aria-label="下载 PPTX">⬇</button>
                      </li>
                    </template>
                  </ul>
                </div>
              </template>
              <div x-show="filteredCount === 0"
                   class="px-4 py-12 text-center text-sm text-slate-400">
                <span x-show="$store.jobs.list.length === 0">还没有任务，点上方「新建任务」开始</span>
                <span x-show="$store.jobs.list.length > 0 && filteredCount === 0">没有匹配的任务</span>
              </div>
            </div>
          </aside>

          <!-- Main outlet -->
          <main class="flex-1 min-w-0 bg-slate-50 dark:bg-slate-950">

            <!-- Home: empty -->
            <template x-if="route.view === 'home'">
              <div x-data="emptyView" class="h-full flex items-center justify-center px-6">
                <div class="text-center max-w-md">
                  <h2 class="text-xl font-semibold mb-2">欢迎回来</h2>
                  <p class="text-sm text-slate-500 dark:text-slate-400 mb-5">
                    从左侧选一个任务继续，或者新建一个。
                  </p>
                  <div class="flex gap-2 justify-center">
                    <button @click="go('#/new')"
                            class="px-4 py-2 rounded-md bg-gemini-600 hover:bg-gemini-700 text-white text-sm">
                      新建任务
                    </button>
                    <button @click="go('#/templates')"
                            class="px-4 py-2 rounded-md border border-slate-200 dark:border-slate-700 text-sm
                                   hover:bg-slate-100 dark:hover:bg-slate-800">
                      浏览模板
                    </button>
                  </div>
                </div>
              </div>
            </template>

            <!-- New job -->
            <template x-if="route.view === 'newJob'">
              <div x-data="newJobView" class="p-6 max-w-5xl mx-auto">

                <div class="flex items-center justify-between mb-4">
                  <h2 class="text-lg font-semibold">新建任务</h2>
                  <span class="text-xs text-slate-500"
                        x-text="`消耗 1 credit · 当前余额 ${$store.auth.quota()}`"></span>
                </div>

                <!-- Template picker -->
                <div class="bg-white dark:bg-slate-900 rounded-lg shadow-sm p-4 mb-4">
                  <h3 class="text-sm font-medium mb-2">从模板开始</h3>
                  <div class="grid grid-cols-2 md:grid-cols-4 gap-2">
                    <template x-for="t in templates" :key="t.id">
                      <button @click="selectTemplate(t.id)"
                              :class="selectedTemplateId === t.id
                                      ? 'border-gemini-500 bg-gemini-50 dark:bg-gemini-900/20'
                                      : 'border-slate-200 dark:border-slate-700 hover:border-slate-300'"
                              class="text-left p-3 rounded-md border transition-colors">
                        <div class="font-medium text-sm" x-text="t.name"></div>
                        <div class="text-xs text-slate-500 mt-0.5 line-clamp-2" x-text="t.description"></div>
                      </button>
                    </template>
                  </div>
                </div>

                <!-- Form -->
                <div class="grid grid-cols-1 lg:grid-cols-3 gap-4">

                  <!-- Left: form -->
                  <div class="lg:col-span-2 space-y-4">

                    <div class="bg-white dark:bg-slate-900 rounded-lg shadow-sm p-4">
                      <label class="block">
                        <span class="text-xs text-slate-500">项目名（可选）</span>
                        <input type="text" x-model="projectName" maxlength="64"
                               placeholder="留空则自动从 prompt 生成"
                               class="mt-1 w-full px-3 py-2 rounded-md border border-slate-200 dark:border-slate-700
                                      bg-white dark:bg-slate-800 focus:outline-none focus:border-gemini-500" />
                      </label>
                    </div>

                    <!-- Prompt editor + variables -->
                    <div class="bg-white dark:bg-slate-900 rounded-lg shadow-sm p-4">
                      <span class="text-xs text-slate-500 mb-1 block">
                        Prompt（用 <code class="text-gemini-600">{{变量}}</code> 引用变量）
                      </span>
                      <div class="prompt-editor">
                        <pre class="prompt-editor__highlight" x-html="(window.extractVars ? window.highlightPrompt(prompt) : prompt)"></pre>
                        <textarea class="prompt-editor__input"
                                  x-model="prompt" @input="onPromptInput()"
                                  placeholder="例：为 ACME 写一份 5 页产品介绍 PPT…"></textarea>
                      </div>

                      <!-- Variable panel -->
                      <div x-show="variableNames.length > 0" class="mt-3 pt-3 border-t border-slate-200 dark:border-slate-700">
                        <h4 class="text-xs font-medium text-slate-500 mb-2">
                          变量 (<span x-text="variableNames.length"></span>)
                        </h4>
                        <div class="grid grid-cols-1 sm:grid-cols-2 gap-2">
                          <template x-for="vname in variableNames" :key="vname">
                            <label class="block">
                              <span class="text-xs text-slate-500"
                                    x-text="variableDefs[vname].label || vname"></span>
                              <template x-if="variableDefs[vname].type === 'textarea'">
                                <textarea :value="variableValues[vname] || ''"
                                          @input="onVariableChange(vname, $event.target.value)"
                                          rows="2" :placeholder="variableDefs[vname].placeholder || ''"
                                          class="mt-0.5 w-full px-2 py-1.5 rounded-md border border-slate-200 dark:border-slate-700
                                                 bg-white dark:bg-slate-800 text-sm focus:outline-none focus:border-gemini-500"></textarea>
                              </template>
                              <template x-if="variableDefs[vname].type === 'number'">
                                <input type="number" :value="variableValues[vname] || ''"
                                       @input="onVariableChange(vname, $event.target.value)"
                                       :placeholder="variableDefs[vname].placeholder || ''"
                                       class="mt-0.5 w-full px-2 py-1.5 rounded-md border border-slate-200 dark:border-slate-700
                                              bg-white dark:bg-slate-800 text-sm focus:outline-none focus:border-gemini-500" />
                              </template>
                              <template x-if="variableDefs[vname].type === 'select'">
                                <select :value="variableValues[vname] || ''"
                                        @change="onVariableChange(vname, $event.target.value)"
                                        class="mt-0.5 w-full px-2 py-1.5 rounded-md border border-slate-200 dark:border-slate-700
                                               bg-white dark:bg-slate-800 text-sm focus:outline-none focus:border-gemini-500">
                                  <template x-for="opt in (variableDefs[vname].options || [])" :key="opt">
                                    <option :value="opt" x-text="opt"></option>
                                  </template>
                                </select>
                              </template>
                              <template x-if="!['textarea','number','select'].includes(variableDefs[vname].type)">
                                <input type="text" :value="variableValues[vname] || ''"
                                       @input="onVariableChange(vname, $event.target.value)"
                                       :placeholder="variableDefs[vname].placeholder || ''"
                                       class="mt-0.5 w-full px-2 py-1.5 rounded-md border border-slate-200 dark:border-slate-700
                                              bg-white dark:bg-slate-800 text-sm focus:outline-none focus:border-gemini-500" />
                              </template>
                              <span x-show="variableDefs[vname].required && !variableValues[vname]"
                                    class="text-xs text-rose-500">必填</span>
                            </label>
                          </template>
                        </div>
                      </div>
                    </div>

                    <!-- File dropzone -->
                    <div x-data="fileDropzone()" x-ref="files"
                         class="bg-white dark:bg-slate-900 rounded-lg shadow-sm p-4">
                      <h3 class="text-sm font-medium mb-2">附件（可选）</h3>
                      <div @dragover.prevent="dragging = true" @dragleave.prevent="dragging = false"
                           @drop.prevent="onDrop($event)" @click="openPicker()"
                           :class="dragging ? 'border-gemini-500 bg-gemini-50/30' : 'border-slate-200 dark:border-slate-700'"
                           class="border-2 border-dashed rounded-md py-6 text-center cursor-pointer
                                  hover:border-slate-300 transition-colors">
                        <p class="text-sm text-slate-500">拖拽文件到这里，或点击选择</p>
                        <p class="text-xs text-slate-400 mt-1">支持多文件，单个 ≤ 25MB，总计 ≤ 50MB</p>
                      </div>
                      <input type="file" multiple x-ref="input" @change="onPick($event)" class="hidden" />
                      <ul x-show="files.length > 0" class="mt-3 space-y-1">
                        <template x-for="(f, idx) in files" :key="idx">
                          <li class="flex items-center gap-2 text-sm py-1.5 px-2 rounded bg-slate-50 dark:bg-slate-800">
                            <span class="flex-1 truncate" x-text="f.name"></span>
                            <span class="text-xs text-slate-500" x-text="fmtBytes(f.size)"></span>
                            <button @click="remove(idx)" class="text-slate-400 hover:text-rose-600">×</button>
                          </li>
                        </template>
                      </ul>
                    </div>

                    <div class="flex justify-end gap-2">
                      <button @click="cancel()" type="button"
                              class="px-4 py-2 rounded-md border border-slate-200 dark:border-slate-700 text-sm
                                     hover:bg-slate-100 dark:hover:bg-slate-800">取消</button>
                      <button @click="submit()" :disabled="!canSubmit" type="button"
                              class="px-4 py-2 rounded-md bg-gemini-600 hover:bg-gemini-700 text-white text-sm
                                     disabled:opacity-50 disabled:cursor-not-allowed">
                        <span x-text="submitting ? '提交中…' : '创建任务'"></span>
                      </button>
                    </div>
                  </div>

                  <!-- Right: live preview -->
                  <div class="lg:col-span-1">
                    <div class="bg-white dark:bg-slate-900 rounded-lg shadow-sm p-4 sticky top-20">
                      <h3 class="text-sm font-medium mb-2">最终 Prompt 预览</h3>
                      <pre class="text-xs whitespace-pre-wrap text-slate-600 dark:text-slate-400
                                  bg-slate-50 dark:bg-slate-950 rounded p-3 max-h-96 overflow-y-auto"
                           x-text="filledPrompt"></pre>
                    </div>
                  </div>

                </div>
              </div>
            </template>

            <!-- Job detail -->
            <template x-if="route.view === 'jobDetail'">
              <div x-data="jobDetailView" x-init="init()" class="h-full flex flex-col">

                <!-- Loading -->
                <div x-show="loading" class="flex-1 flex items-center justify-center text-slate-400">载入中…</div>

                <!-- Error -->
                <div x-show="!loading && error" class="p-6">
                  <div class="bg-rose-50 dark:bg-rose-900/20 text-rose-700 dark:text-rose-200
                              rounded-md p-4 text-sm" x-text="error"></div>
                </div>

                <!-- Content -->
                <div x-show="!loading && !error && job" class="flex-1 flex flex-col min-h-0">

                  <!-- Head -->
                  <div class="px-6 pt-5 pb-3 border-b border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900">
                    <div class="flex items-center gap-3">
                      <button @click="window.location.hash = '#/'" class="text-slate-500 hover:text-slate-900 dark:hover:text-slate-100"
                              aria-label="返回列表">←</button>
                      <h2 class="text-lg font-semibold flex-1 min-w-0 truncate"
                          x-text="job?.project_name || '(未命名)'"></h2>
                      <span :class="sseClass" :title="`SSE ${sseStatus}`"></span>
                      <span class="status-pill" :class="`status-${status}`" x-text="({
                        queued:'排队', running:'运行中', paused:'待确认', done:'完成', failed:'失败', cancelled:'已取消'
                      })[status] || status"></span>
                      <button x-show="isActive" @click="doCancel()"
                              class="text-xs px-2.5 py-1 rounded-md border border-slate-200 dark:border-slate-700
                                     text-rose-600 hover:bg-rose-50 dark:hover:bg-rose-900/20">取消</button>
                      <button x-show="hasPptx" @click="doDownload()"
                              class="text-xs px-2.5 py-1 rounded-md bg-gemini-600 hover:bg-gemini-700 text-white">⬇ 下载</button>
                    </div>

                    <!-- Resume 面板（paused 时显示） -->
                    <div x-show="isPaused"
                         class="mt-3 p-3 rounded-md bg-amber-50 dark:bg-amber-900/20 border border-amber-200 dark:border-amber-800">
                      <p class="text-sm text-amber-900 dark:text-amber-100 mb-2">
                        <strong>agent 等你确认</strong> — 输入确认文本继续生成：
                      </p>
                      <textarea x-model="confirmText" rows="2" placeholder="例：确认，按推荐方案继续"
                                class="w-full px-3 py-2 rounded-md border border-amber-300 dark:border-amber-700
                                       bg-white dark:bg-slate-800 text-sm"></textarea>
                      <button @click="doResume()" :disabled="submittingResume"
                              class="mt-2 px-3 py-1.5 rounded-md bg-amber-600 hover:bg-amber-700 text-white text-sm
                                     disabled:opacity-50">▶ 确认继续</button>
                    </div>

                    <!-- Stage progress（running 时显示） -->
                    <div x-show="status === 'running' && stage"
                         class="mt-3 flex items-center gap-1 text-xs">
                      <template x-for="(s, idx) in [
                        '1 解析素材','2 建项目','3 策略规划','5 生图','6 逐页生成 SVG','7 质检','8 后处理','8 导出 PPTX'
                      ]" :key="s">
                        <div class="flex items-center gap-1">
                          <span class="px-2 py-0.5 rounded"
                                :class="idx <= currentStageIdx
                                        ? 'bg-gemini-100 dark:bg-gemini-900/40 text-gemini-700 dark:text-gemini-200'
                                        : 'bg-slate-100 dark:bg-slate-800 text-slate-400'"
                                x-text="s"></span>
                          <span x-show="idx < 7" class="text-slate-300 dark:text-slate-600">›</span>
                        </div>
                      </template>
                    </div>
                  </div>

                  <!-- Tabs -->
                  <div class="px-6 pt-3 border-b border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900">
                    <div class="flex gap-1">
                      <button @click="setTab('overview')"
                              :class="tab === 'overview'
                                      ? 'border-b-2 border-gemini-600 text-gemini-700 dark:text-gemini-200'
                                      : 'text-slate-500 hover:text-slate-900 dark:hover:text-slate-100'"
                              class="px-3 py-2 text-sm">概览</button>
                      <button @click="setTab('timeline')"
                              :class="tab === 'timeline'
                                      ? 'border-b-2 border-gemini-600 text-gemini-700 dark:text-gemini-200'
                                      : 'text-slate-500 hover:text-slate-900 dark:hover:text-slate-100'"
                              class="px-3 py-2 text-sm">时间线 <span class="text-xs text-slate-400" x-text="`(${timeline.length})`"></span></button>
                      <button @click="setTab('files')"
                              :class="tab === 'files'
                                      ? 'border-b-2 border-gemini-600 text-gemini-700 dark:text-gemini-200'
                                      : 'text-slate-500 hover:text-slate-900 dark:hover:text-slate-100'"
                              class="px-3 py-2 text-sm">产物</button>
                    </div>
                  </div>

                  <!-- Tab content -->
                  <div class="flex-1 overflow-y-auto scrollbar-thin p-6">

                    <!-- Overview tab -->
                    <div x-show="tab === 'overview'" class="space-y-4 max-w-3xl">
                      <div class="bg-white dark:bg-slate-900 rounded-lg shadow-sm p-4 space-y-3">
                        <div class="grid grid-cols-[100px_1fr] gap-y-2 text-sm">
                          <div class="text-slate-500">Job ID</div><div><code x-text="job?.id"></code></div>
                          <div class="text-slate-500">创建</div><div x-text="fmtDateTime(job?.created_at)"></div>
                          <div class="text-slate-500">更新</div><div x-text="fmtDateTime(job?.updated_at)"></div>
                          <div class="text-slate-500">花费</div><div x-text="fmtCost(job?.cost_usd)"></div>
                          <div class="text-slate-500">Session</div><div><code x-text="job?.session_id || '—'"></code></div>
                          <div class="text-slate-500">项目目录</div><div><code class="break-all" x-text="job?.project_dir || '—'"></code></div>
                        </div>
                      </div>

                      <div x-show="job?.error_message"
                           class="bg-rose-50 dark:bg-rose-900/20 border border-rose-200 dark:border-rose-800
                                  rounded-md p-3 text-sm text-rose-700 dark:text-rose-200"
                           x-text="job?.error_message"></div>

                      <div class="bg-white dark:bg-slate-900 rounded-lg shadow-sm p-4">
                        <h3 class="text-sm font-medium mb-2">Agent 最新输出</h3>
                        <div class="text-sm whitespace-pre-wrap text-slate-700 dark:text-slate-300"
                             x-text="job?.last_agent_text || '(等待输出…)'"></div>
                      </div>

                      <div class="bg-white dark:bg-slate-900 rounded-lg shadow-sm p-4"
                           x-show="hasPptx">
                        <h3 class="text-sm font-medium mb-2">产物</h3>
                        <a class="text-gemini-600 hover:underline text-sm"
                           :href="`/api/jobs/${jobId}/pptx`" :download="job?.project_name + '.pptx'">
                          ⬇ 下载 <span x-text="job?.project_name"></span>.pptx
                        </a>
                      </div>
                    </div>

                    <!-- Timeline tab -->
                    <div x-show="tab === 'timeline'">
                      <div x-show="timeline.length === 0" class="text-center text-sm text-slate-400 py-12">
                        等待事件…
                      </div>
                      <ul class="space-y-1.5">
                        <template x-for="(ev, idx) in timeline" :key="`${ev.seq}-${idx}`">
                          <li class="flex items-start gap-2 text-sm py-1.5 px-2 rounded hover:bg-slate-100 dark:hover:bg-slate-800">
                            <span class="text-xs px-1.5 py-0.5 rounded font-mono"
                                  :class="{
                                    'status-running': ev.type === 'status',
                                    'bg-amber-100 dark:bg-amber-900/30 text-amber-700 dark:text-amber-300': ev.type === 'stage',
                                    'bg-slate-200 dark:bg-slate-700': !['status','stage'].includes(ev.type)
                                  }"
                                  x-text="ev.type"></span>
                            <div class="flex-1 min-w-0">
                              <template x-if="ev.type === 'tool'">
                                <div>
                                  <span class="font-medium" x-text="ev.payload.tool"></span>
                                  <span class="text-slate-500 ml-1" x-text="ev.payload.stage || ev.payload.tool"></span>
                                  <div class="text-xs text-slate-500 truncate" x-text="ev.payload.command || ev.payload.file_path || ''"></div>
                                </div>
                              </template>
                              <template x-if="ev.type === 'stage'">
                                <div class="font-medium text-amber-700 dark:text-amber-300" x-text="`→ ${ev.payload.stage}`"></div>
                              </template>
                              <template x-if="ev.type === 'agent_text'">
                                <div class="whitespace-pre-wrap" x-text="ev.payload.text"></div>
                              </template>
                              <template x-if="ev.type === 'result'">
                                <div class="text-slate-600 dark:text-slate-400">
                                  cost=<span x-text="fmtCost(ev.payload.cost_usd)"></span>,
                                  stop=<span x-text="ev.payload.stop_reason"></span>
                                </div>
                              </template>
                              <template x-if="ev.type === 'error'">
                                <div class="text-rose-600" x-text="ev.payload.message"></div>
                              </template>
                              <template x-if="ev.type === 'spec'">
                                <div class="text-slate-500 italic">spec updated</div>
                              </template>
                            </div>
                          </li>
                        </template>
                      </ul>
                    </div>

                    <!-- Files tab -->
                    <div x-show="tab === 'files'" class="space-y-4 max-w-3xl">
                      <div class="bg-white dark:bg-slate-900 rounded-lg shadow-sm p-4"
                           x-show="hasPptx">
                        <h3 class="text-sm font-medium mb-2">生成的 PPTX</h3>
                        <a class="text-gemini-600 hover:underline text-sm"
                           :href="`/api/jobs/${jobId}/pptx`" :download="job?.project_name + '.pptx'">
                          ⬇ <span x-text="job?.project_name"></span>.pptx
                        </a>
                      </div>
                      <div class="bg-white dark:bg-slate-900 rounded-lg shadow-sm p-4">
                        <h3 class="text-sm font-medium mb-2">会话信息</h3>
                        <p class="text-sm text-slate-600 dark:text-slate-400">
                          上传的源文件在 server 端 <code>data/users/&lt;uid&gt;/uploads/&lt;job_id&gt;/</code>，
                          生成的项目在 <code>data/users/&lt;uid&gt;/projects/&lt;job_id&gt;/</code>。
                          Phase 2 会做文件列表 API。
                        </p>
                      </div>
                    </div>

                  </div>
                </div>
              </div>
            </template>

            <!-- Templates list -->
            <template x-if="route.view === 'templates'">
              <div x-data="templatesView" class="p-6 max-w-5xl mx-auto">
                <div class="flex items-center justify-between mb-4">
                  <div>
                    <h2 class="text-lg font-semibold">模板库</h2>
                    <p class="text-sm text-slate-500 dark:text-slate-400">
                      选择一个模板开始，或编辑现有模板。
                      <span class="text-xs text-amber-600 dark:text-amber-400">(本轮 mock 数据，Phase 2 接后端)</span>
                    </p>
                  </div>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-3">
                  <template x-for="t in templates" :key="t.id">
                    <div class="bg-white dark:bg-slate-900 rounded-lg shadow-sm p-4 flex flex-col">
                      <h3 class="font-medium text-sm" x-text="t.name"></h3>
                      <p class="text-xs text-slate-500 mt-1 line-clamp-2" x-text="t.description"></p>
                      <div class="mt-2 flex flex-wrap gap-1">
                        <template x-for="(def, name) in t.variables" :key="name">
                          <span class="text-[10px] px-1.5 py-0.5 rounded bg-slate-100 dark:bg-slate-800 text-slate-600 dark:text-slate-400"
                                x-text="`{{${name}}}`"></span>
                        </template>
                      </div>
                      <div class="mt-auto pt-3 flex gap-2">
                        <button @click="useTemplate(t.id)"
                                class="flex-1 px-3 py-1.5 rounded-md bg-gemini-600 hover:bg-gemini-700 text-white text-xs">使用</button>
                        <button @click="editTemplate(t.id)"
                                class="px-3 py-1.5 rounded-md border border-slate-200 dark:border-slate-700 text-xs
                                       hover:bg-slate-50 dark:hover:bg-slate-800">编辑</button>
                      </div>
                    </div>
                  </template>
                </div>
              </div>
            </template>

            <!-- Template editor -->
            <template x-if="route.view === 'templateEditor'">
              <div x-data="templateEditorView" class="p-6 max-w-5xl mx-auto">

                <div class="flex items-center gap-3 mb-4">
                  <button @click="cancel()" class="text-slate-500 hover:text-slate-900 dark:hover:text-slate-100">←</button>
                  <div>
                    <h2 class="text-lg font-semibold" x-text="template?.name || '模板'"></h2>
                    <p class="text-xs text-amber-600 dark:text-amber-400">Phase 1 stub — 编辑不会持久化</p>
                  </div>
                </div>

                <div x-show="!template" class="text-sm text-slate-500">模板不存在</div>

                <div x-show="template" class="grid grid-cols-1 lg:grid-cols-3 gap-4">
                  <div class="lg:col-span-2 space-y-3">
                    <div class="bg-white dark:bg-slate-900 rounded-lg shadow-sm p-4">
                      <span class="text-xs text-slate-500 mb-1 block">Prompt 模板</span>
                      <div class="prompt-editor">
                        <pre class="prompt-editor__highlight" x-html="highlighted"></pre>
                        <textarea class="prompt-editor__input"
                                  x-model="prompt" @input="onPromptInput()"
                                  placeholder="用 {{variable}} 引用变量"></textarea>
                      </div>
                    </div>

                    <div class="bg-white dark:bg-slate-900 rounded-lg shadow-sm p-4">
                      <div class="flex items-center justify-between mb-2">
                        <h3 class="text-sm font-medium">变量定义</h3>
                        <button @click="addVariable()"
                                class="text-xs px-2 py-1 rounded bg-gemini-50 dark:bg-gemini-900/30 text-gemini-700 dark:text-gemini-200
                                       hover:bg-gemini-100 dark:hover:bg-gemini-900/50">+ 添加</button>
                      </div>
                      <div class="space-y-2">
                        <template x-for="(def, name) in variables" :key="name">
                          <div class="flex items-center gap-2 text-sm">
                            <code class="px-2 py-0.5 bg-gemini-50 dark:bg-gemini-900/30 text-gemini-700 dark:text-gemini-200 rounded text-xs"
                                  x-text="`{{${name}}}`"></code>
                            <select x-model="variables[name].type"
                                    class="text-xs px-1 py-0.5 rounded border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800">
                              <option value="text">text</option>
                              <option value="number">number</option>
                              <option value="textarea">textarea</option>
                              <option value="select">select</option>
                            </select>
                            <input type="text" x-model="variables[name].label" placeholder="label"
                                   class="flex-1 text-xs px-2 py-0.5 rounded border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800" />
                            <button @click="removeVariable(name)"
                                    class="text-slate-400 hover:text-rose-600 text-xs">删除</button>
                          </div>
                        </template>
                      </div>
                    </div>

                    <div class="flex justify-end gap-2">
                      <button @click="cancel()" class="px-3 py-1.5 rounded-md border border-slate-200 dark:border-slate-700 text-sm">取消</button>
                      <button @click="save()" class="px-3 py-1.5 rounded-md bg-gemini-600 hover:bg-gemini-700 text-white text-sm">保存</button>
                    </div>
                  </div>

                  <div class="lg:col-span-1">
                    <div class="bg-white dark:bg-slate-900 rounded-lg shadow-sm p-4 sticky top-20">
                      <h3 class="text-sm font-medium mb-2">预览</h3>
                      <pre class="text-xs whitespace-pre-wrap text-slate-600 dark:text-slate-400
                                  bg-slate-50 dark:bg-slate-950 rounded p-3 max-h-96 overflow-y-auto"
                           x-text="prompt"></pre>
                    </div>
                  </div>
                </div>
              </div>
            </template>

          </main>
        </div>
      </div>
    </template>
  </div>

  <!-- Toast host -->
  <div id="toast-host"
       x-data="{ items: [] }"
       @toast.window="items.push({...$event.detail, id: Date.now() + Math.random()}); setTimeout(() => items.shift(), $event.detail.durationMs || 3500)"
       class="fixed bottom-4 right-4 z-50 flex flex-col gap-2 pointer-events-none">
    <template x-for="t in items" :key="t.id">
      <div class="toast" :class="t.kind" x-text="t.message"></div>
    </template>
  </div>

  <!-- Modal host -->
  <div id="modal-host"
       x-data
       x-show="$store.modal.open" x-cloak
       @keydown.escape.window="$store.modal.close()"
       @click.self="$store.modal.close()"
       class="fixed inset-0 z-40 flex items-center justify-center bg-black/40 backdrop-blur-sm">
    <div class="bg-white dark:bg-slate-900 rounded-lg shadow-lg w-full max-w-md mx-4 p-5"
         x-show="$store.modal.open"
         x-transition.opacity>
      <h3 class="text-base font-semibold mb-2" x-text="$store.modal.title"></h3>
      <p class="text-sm text-slate-600 dark:text-slate-400 mb-4 whitespace-pre-line" x-text="$store.modal.body"></p>
      <div class="flex justify-end gap-2">
        <button @click="$store.modal.close()"
                class="px-3 py-1.5 text-sm rounded-md hover:bg-slate-100 dark:hover:bg-slate-800"
                x-text="$store.modal.cancelText || '取消'"></button>
        <button @click="$store.modal.confirm()"
                class="px-3 py-1.5 text-sm rounded-md bg-gemini-600 hover:bg-gemini-700 text-white"
                x-text="$store.modal.confirmText || '确定'"></button>
      </div>
    </div>
  </div>

</body>
</html>
